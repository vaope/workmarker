<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data: file:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>WorkEventAgent</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <!-- workspace 引导（首启 / 无 workspace 时显示） -->
  <div id="setup" class="setup hidden">
    <div class="setup-card">
      <div class="logo-dot"></div>
      <h1>WorkEventAgent</h1>
      <p>选择一个目录作为项目库。所有项目文档、附件和索引都保存在这里。</p>
      <div class="setup-row">
        <input id="setup-path" type="text" placeholder="尚未选择目录" readonly />
        <button id="setup-pick" class="ghost">选择目录</button>
      </div>
      <button id="setup-confirm" class="primary" disabled>开始使用</button>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="app" class="app hidden">
    <!-- 左栏：项目库 -->
    <aside class="sidebar">
      <div class="sidebar-head"><span class="brand">项目库</span></div>
      <ul id="project-list" class="project-list"></ul>
      <div class="sidebar-foot">
        <button id="new-project" class="ghost block">+ 新建项目</button>
        <button id="change-workspace" class="link" title="更换项目库目录">⚙ 设置</button>
      </div>
    </aside>

    <!-- 右栏：工作视图 -->
    <main class="content">
      <header class="content-head">
        <div class="head-left">
          <div class="tabs">
            <button class="tab active" data-view="tasks">任务视图</button>
            <button class="tab" data-view="timeline">时间线</button>
            <button class="tab" data-view="reports">报告</button>
            <button class="tab" data-view="inbox">收件箱</button>
            <button class="tab" data-view="search">搜索</button>
          </div>
          <button id="new-item" class="ghost small">+ 新建需求</button>
        </div>
        <span id="project-title" class="project-title"></span>
      </header>

      <section id="tasks-view" class="view">
        <div id="tasks-body" class="scroll-body"></div>
      </section>

      <section id="timeline-view" class="view hidden">
        <div id="timeline-body" class="scroll-body"></div>
      </section>

      <section id="reports-view" class="view hidden">
        <div class="report-schedule-card">
          <label><input id="report-daily-enabled" type="checkbox" /> 定时日报</label>
          <input id="report-daily-time" type="time" value="23:30" />
          <label><input id="report-weekly-enabled" type="checkbox" /> 定时周报</label>
          <select id="report-weekly-day">
            <option value="1">周一</option>
            <option value="2">周二</option>
            <option value="3">周三</option>
            <option value="4">周四</option>
            <option value="5">周五</option>
            <option value="6">周六</option>
            <option value="0">周日</option>
          </select>
          <input id="report-weekly-time" type="time" value="18:00" />
          <button id="report-save-schedule" class="small">保存定时设置</button>
        </div>
        <div class="report-toolbar">
          <select id="report-type">
            <option value="daily">日报</option>
            <option value="weekly">周报</option>
            <option value="range">指定日期范围</option>
            <option value="project_summary">项目总结</option>
          </select>
          <input id="report-date-from" type="date" />
          <input id="report-date-to" type="date" />
          <button id="report-generate" class="primary small">生成并保存</button>
          <span id="report-status" class="report-status"></span>
        </div>
        <div id="reports-body" class="scroll-body report-body"></div>
      </section>

      <section id="inbox-view" class="view hidden">
        <div class="view-head">
          <h2>收件箱</h2>
          <button class="ghost" id="inbox-refresh">刷新</button>
        </div>
        <div id="inbox-body" class="inbox-body scroll-body"></div>
      </section>

      <section id="search-view" class="view hidden">
        <div class="search-bar">
          <input id="global-search" aria-label="搜索项目、任务、时间线、报告" placeholder="搜索项目、任务、时间线、报告…" />
          <button class="primary" id="search-run">搜索</button>
        </div>
        <div id="search-results" class="search-results scroll-body"></div>
      </section>

      <!-- 确认卡片（浮于输入条上方） -->
      <div id="confirm-card" class="confirm-card hidden"></div>

      <!-- 底部常驻输入条 -->
      <footer class="composer">
        <div id="thumbs" class="thumbs hidden"></div>
        <div class="composer-row">
          <button id="attach-hint" class="icon-btn" title="按 Ctrl+V 粘贴剪贴板图片">📎</button>
          <textarea id="composer-input" rows="1"
                    placeholder="记录一下进展…  (Enter 提交 · Ctrl+Enter 换行 · Ctrl+V 粘贴图片)"></textarea>
          <button id="submit-btn" class="primary">提交</button>
        </div>
        <div id="composer-status" class="composer-status"></div>
      </footer>
    </main>
  </div>

  <!-- 项目初始化模态 -->
  <div id="init-modal" class="modal hidden">
    <div class="modal-card">
      <h2>初始化新项目</h2>
      <label class="field">项目名称
        <input id="init-title" type="text" placeholder="如：基于大模型的多模态标注系统" />
      </label>
      <label class="field">项目 ID
        <input id="init-id" type="text" placeholder="自动生成，可手动修改" />
        <span class="hint">小写字母、数字、连字符。保存后不可随意更改。</span>
      </label>
      <div class="field-label">初始事项（可选，建议至少一个事项 + 一个任务）</div>
      <div class="init-items" id="init-items"></div>
      <button id="init-add-item" class="ghost">+ 添加事项</button>
      <div class="modal-actions">
        <button id="init-cancel" class="ghost">取消</button>
        <button id="init-create" class="primary">创建项目</button>
      </div>
      <div id="init-error" class="modal-error hidden"></div>
    </div>
  </div>

  <div id="manual-modal" class="modal hidden">
    <div class="modal-card small-card">
      <h2 id="manual-title">新建需求</h2>
      <label id="manual-item-field" class="field hidden">所属需求
        <select id="manual-item"></select>
      </label>
      <label class="field"><span id="manual-name-label">需求名称</span>
        <input id="manual-name" type="text" placeholder="例如：明确项目需求" />
      </label>
      <label class="field">背景介绍 <span class="hint">（可选）</span>
        <textarea id="manual-background" rows="2" placeholder="为什么做这个需求、范围、重要约束"></textarea>
      </label>
      <div class="modal-actions">
        <button id="manual-cancel" class="ghost">取消</button>
        <button id="manual-create" class="primary">创建</button>
      </div>
      <div id="manual-error" class="modal-error hidden"></div>
    </div>
  </div>

  <!-- 编辑需求模态 -->
  <div id="edit-item-modal" class="modal hidden">
    <div class="modal-card small-card">
      <h2>编辑需求</h2>
      <label class="field">需求名称
        <input id="edit-item-title" type="text" placeholder="需求名称" />
      </label>
      <label class="field">背景介绍 <span class="hint">（可选）</span>
        <textarea id="edit-item-background" rows="3" placeholder="为什么做这个需求、范围、重要约束"></textarea>
      </label>
      <div class="modal-actions">
        <button id="edit-item-cancel" class="ghost">取消</button>
        <button id="edit-item-save" class="primary">保存</button>
      </div>
      <div id="edit-item-error" class="modal-error hidden"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-card small-card">
      <h2>设置</h2>
      <label class="field">项目库目录
        <div class="settings-row">
          <input id="settings-workspace" type="text" readonly />
          <button id="settings-pick-workspace" class="ghost" type="button">选择</button>
        </div>
      </label>
      <label class="field">快速捕获快捷键
        <input id="settings-hotkey" type="text" placeholder="CommandOrControl+Shift+Space" />
        <span class="hint">示例：CommandOrControl+Shift+Space、Alt+Space、Control+Alt+W</span>
      </label>
      <div class="modal-actions">
        <button id="settings-cancel" class="ghost">取消</button>
        <button id="settings-save" class="primary">保存</button>
      </div>
      <div id="settings-error" class="modal-error hidden"></div>
    </div>
  </div>

  <div id="correction-modal" class="modal hidden">
    <div class="modal-card">
      <h2>纠正归档</h2>
      <div class="correction-src">
        <p class="correction-label">原始事件：<span id="corr-original-summary"></span></p>
        <p class="correction-label">来源项目：<span id="corr-source-project"></span> / <span id="corr-source-task"></span></p>
      </div>
      <label class="field">目标项目
        <select id="corr-target-project"></select>
      </label>
      <label class="field">目标事项
        <select id="corr-target-item"></select>
      </label>
      <label class="field">目标任务
        <select id="corr-target-task"></select>
      </label>
      <label class="field">摘要
        <input id="corr-summary" type="text" />
      </label>
      <label class="field">状态
        <select id="corr-status">
          <option value="in_progress">进行中</option>
          <option value="done">已完成</option>
          <option value="blocked">阻塞</option>
        </select>
      </label>
      <label class="field">下一步
        <input id="corr-next-action" type="text" />
      </label>
      <label class="field">纠正原因
        <input id="corr-reason" type="text" placeholder="归档错误需要纠正" />
      </label>
      <div id="corr-preview" class="correction-diff hidden"></div>
      <div class="modal-actions">
        <button id="corr-cancel" class="ghost">取消</button>
        <button id="corr-submit" class="primary">提交纠正</button>
      </div>
      <div id="corr-error" class="modal-error hidden"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="main.js"></script>
</body>
</html>
